name: Verify

on:
  pull_request:
  push:
    branches:
      - main
      - master
      - 'codex/**'

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run canonical verify
        run: npm run check

      - name: Run smoke build
        run: npm run smoke

      - name: Install Chromium for web smoke
        run: npx playwright install --with-deps chromium

      - name: Run browser smoke
        run: npm run smoke:web
